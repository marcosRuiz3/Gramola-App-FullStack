<div class="content-grid" style="grid-template-columns: 1fr">
  <section class="history-section glass-panel layout-box">
    <h3>Canciones reproducidas hoy</h3>

    <div class="history-list" style="margin-top: 20px">
      @for (track of historialDeHoy; track track.id; let i = $index) {
        <div
          class="track-item base-track"
          style="
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            opacity: 0.8;
          "
        >
          <span
            style="
              color: var(--text-dim);
              font-weight: bold;
              width: 30px;
              margin-right: 10px;
              text-align: center;
            "
          >
            {{ i + 1 }}.
          </span>

          <img
            [src]="track.albumImageUrl"
            alt="Carátula"
            style="
              width: 40px;
              height: 40px;
              border-radius: 6px;
              margin-right: 15px;
              object-fit: cover;
              filter: grayscale(20%);
            "
          />

          <div class="track-info" style="flex-grow: 1">
            <span
              class="title"
              style="font-weight: bold; display: block; color: var(--text-light)"
              >{{ track.trackName }}</span
            >
            <span class="artist" style="color: var(--text-dim); font-size: 0.9rem">{{
              track.artist
            }}</span>
          </div>

          <span
            class="tag base-tag"
            style="
              background: rgba(255, 255, 255, 0.05);
              color: #888;
              border: 1px solid rgba(255, 255, 255, 0.1);
            "
          >
            ✓ Reproducida
          </span>
        </div>
      } @empty {
        <div style="text-align: center; padding: 60px 0; color: var(--text-dim)">
          <p style="font-size: 2.5rem; margin-bottom: 15px">🕰️</p>
          <p style="font-size: 1.1rem">Aún no ha terminado de sonar ninguna canción.</p>
        </div>
      }
    </div>
  </section>
</div>
